name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-update-manifest:
    name: Build, Push, and Update Manifest
    runs-on: ubuntu-latest

    env:
      REGISTRY: amdp-registry.skala-ai.com
      PROJECT: skala26a-ai2
      IMAGE_NAME: skipa-frontend
      INFRA_REPO: skipers/skipa-infra
      INFRA_PATH: k8s/frontend

    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v4

      - name: Set image variables
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "IMAGE_TAG=dev-${SHORT_SHA}" >> $GITHUB_ENV
          echo "IMAGE_REPOSITORY=${REGISTRY}/${PROJECT}/${IMAGE_NAME}" >> $GITHUB_ENV
          echo "IMAGE=${REGISTRY}/${PROJECT}/${IMAGE_NAME}:dev-${SHORT_SHA}" >> $GITHUB_ENV
          echo "LATEST_IMAGE=${REGISTRY}/${PROJECT}/${IMAGE_NAME}:dev-latest" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.LATEST_IMAGE }}

      - name: Checkout infra repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: skipa-infra

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update frontend image tag in kustomization
        working-directory: skipa-infra/${{ env.INFRA_PATH }}
        run: |
          kustomize edit set image "${IMAGE_REPOSITORY}=${IMAGE_REPOSITORY}:${IMAGE_TAG}"

      - name: Commit and push manifest update to infra repository
        run: |
          cd skipa-infra

          if git diff --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${INFRA_PATH}/kustomization.yml"
          git commit -m "ci: update frontend image tag to ${IMAGE_TAG} [skip ci]"
          git push origin main