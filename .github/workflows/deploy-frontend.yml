name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-update-manifest:
    name: Build, Push, and Update Manifest
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-frontend-${{ github.ref_name }}
      cancel-in-progress: true

    env:
      REGISTRY: amdp-registry.skala-ai.com
      PROJECT: skala26a-ai2
      IMAGE_NAME: skipa-frontend
      INFRA_REPO: skipers/skipa-infra
      INFRA_PATH: k8s/frontend

    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v4

      - name: Set image variables
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "IMAGE_TAG=dev-${SHORT_SHA}" >> $GITHUB_ENV
          echo "IMAGE_REPOSITORY=${REGISTRY}/${PROJECT}/${IMAGE_NAME}" >> $GITHUB_ENV
          echo "IMAGE=${REGISTRY}/${PROJECT}/${IMAGE_NAME}:dev-${SHORT_SHA}" >> $GITHUB_ENV
          echo "LATEST_IMAGE=${REGISTRY}/${PROJECT}/${IMAGE_NAME}:dev-latest" >> $GITHUB_ENV

      - name: Show deployment target
        run: |
          echo "Image: ${IMAGE}"
          echo "Latest alias: ${LATEST_IMAGE}"
          echo "Infra path: ${INFRA_REPO}/${INFRA_PATH}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}
            ${{ env.LATEST_IMAGE }}

      - name: Checkout infra repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: skipa-infra

      - name: Install Kustomize
        run: |
          KUSTOMIZE_VERSION=5.8.1
          curl -sLo /tmp/kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Update frontend image tag in kustomization
        working-directory: skipa-infra/${{ env.INFRA_PATH }}
        run: |
          if [ ! -f kustomization.yml ]; then
            echo "Cannot find kustomization.yml in ${INFRA_PATH}" >&2
            exit 1
          fi

          kustomize edit set image "${IMAGE_REPOSITORY}=${IMAGE_REPOSITORY}:${IMAGE_TAG}"

      - name: Commit and push manifest update to infra repository
        run: |
          cd skipa-infra

          if git diff --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${INFRA_PATH}/kustomization.yml"

          if git diff --cached --quiet; then
            echo "No staged manifest changes to commit."
            exit 0
          fi

          git commit -m "ci: update frontend image tag to ${IMAGE_TAG} [skip ci]"
          git push origin main