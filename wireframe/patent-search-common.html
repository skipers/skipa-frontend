<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전체 특허 검색 - 특허 재평가 관리 시스템</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
            background-color: #FFFFFF;
            color: #334155;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 사이드바 */
        .sidebar {
            width: 240px;
            background-color: #1E293B;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 16px;
        }

        .sidebar-menu {
            list-style: none;
            flex: 1;
        }

        .sidebar-menu li {
            margin-bottom: 8px;
        }

        .sidebar-menu a {
            display: block;
            padding: 12px 16px;
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.2s;
        }

        .sidebar-menu a:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .sidebar-menu a.active {
            background-color: #2563EB;
            color: #FFFFFF;
        }

        .sidebar-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 16px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* 메인 콘텐츠 */
        .main {
            margin-left: 240px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* 상단바 */
        .header {
            height: 56px;
            background-color: #FFFFFF;
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            color: #1E293B;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-info {
            text-align: right;
        }

        .name {
            font-size: 12px;
            font-weight: 600;
            color: #1E293B;
        }

        .role {
            font-size: 11px;
            color: #64748B;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #DBEAFE;
            color: #2563EB;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
        }

        /* 콘텐츠 */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: #FFFFFF;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 18px;
            font-weight: 700;
            color: #1E293B;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 12px;
            color: #64748B;
        }

        /* 검색 바 */
        .search-section {
            margin-bottom: 32px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .search-input-group {
            flex: 1;
            min-width: 250px;
        }

        .search-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            color: #334155;
        }

        .search-input:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .search-btn {
            padding: 8px 24px;
            background-color: #2563EB;
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .search-btn:hover {
            background-color: #1D4ED8;
        }

        .reset-btn {
            padding: 8px 16px;
            background-color: #F8FAFC;
            color: #334155;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background-color: #E2E8F0;
        }

        /* 필터 */
        .filter-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-select {
            padding: 8px 12px;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            background-color: #FFFFFF;
            color: #334155;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }

        .filter-select:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* 테이블 */
        .table-container {
            background-color: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        thead {
            background-color: #FFFFFF;
            border-bottom: 2px solid #E2E8F0;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #1E293B;
            background-color: #F8FAFC;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #E2E8F0;
            color: #334155;
        }

        tbody tr {
            background-color: #FFFFFF;
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #F8FAFC;
        }

        /* 특허명 링크 */
        .patent-link {
            font-weight: 600;
            color: #2563EB;
            cursor: pointer;
            text-decoration: none;
        }

        .patent-link:hover {
            text-decoration: underline;
        }

        .patent-number {
            font-size: 11px;
            color: #64748B;
            margin-top: 2px;
        }

        /* 배지 */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-registered {
            background-color: #DCFCE7;
            color: #16A34A;
        }

        .badge-examining {
            background-color: #FEF3C7;
            color: #D97706;
        }

        .badge-rejected {
            background-color: #FEE2E2;
            color: #DC2626;
        }

        .badge-abandoned {
            background-color: #E2E8F0;
            color: #64748B;
        }

        .badge-expiring {
            background-color: #FEE2E2;
            color: #DC2626;
        }

        .badge-yellow {
            background-color: #FEF3C7;
            color: #D97706;
        }

        .badge-blue {
            background-color: #DBEAFE;
            color: #2563EB;
        }

        .badge-gray {
            background-color: #F1F5F9;
            color: #64748B;
        }

        /* 사업부 배지 */
        .dept-badge {
            background-color: #E0E7FF;
            color: #4F46E5;
        }

        /* 페이지네이션 */
        .pagination-info {
            font-size: 11px;
            color: #64748B;
            margin-top: 12px;
            padding: 12px 16px;
        }

        /* 검색 결과 메시지 */
        .search-result-msg {
            font-size: 12px;
            color: #64748B;
            margin-bottom: 12px;
        }

        .search-result-count {
            font-weight: 600;
            color: #1E293B;
        }

        /* 액션 버튼 */
        .action-cell {
            display: flex;
            gap: 6px;
        }

        .action-btn {
            padding: 4px 8px;
            border: 1px solid #E2E8F0;
            background-color: #FFFFFF;
            color: #2563EB;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background-color: #DBEAFE;
            border-color: #2563EB;
        }

        @media (max-width: 1440px) {
            .content {
                padding: 32px;
            }

            .search-bar {
                flex-direction: column;
            }

            .search-input-group {
                width: 100%;
            }

            table {
                font-size: 11px;
            }

            th, td {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-logo">특허 재평가<br>관리 시스템</div>
            <ul class="sidebar-menu">
                <li><a href="#">메인 대시보드</a></li>
                <li><a href="#">특허 재평가 안내</a></li>
                <li><a href="#">담당 특허 현황</a></li>
                <li><a href="#">이번 분기 검토 대상</a></li>
                <li><a href="#">검토 제출 이력</a></li>
                <li style="margin-top: 16px; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 16px;"><a href="#" class="active">전체 특허 검색</a></li>
                <li><a href="#">신규 발명 신고</a></li>
            </ul>
            <div class="sidebar-footer">
                디스플레이 사업부<br>
                <span style="font-size: 11px;">v1.0</span>
            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <div class="main">
            <!-- 상단바 -->
            <header class="header">
                <div class="header-title">전체 특허 검색</div>
                <div class="header-user">
                    <div class="user-info">
                        <div class="name">이영업</div>
                        <div class="role">디스플레이사업부 과장</div>
                    </div>
                    <div class="user-avatar">이</div>
                </div>
            </header>

            <!-- 콘텐츠 -->
            <div class="content">
                <!-- 페이지 헤더 -->
                <div class="page-header">
                    <div class="page-title">전체 특허 검색</div>
                    <div class="page-subtitle">재평가 대상 여부와 관계없이 전체 특허 검색</div>
                </div>

                <!-- 검색 섹션 -->
                <div class="search-section">
                    <div class="search-bar">
                        <div class="search-input-group" style="flex: 1; min-width: 300px;">
                            <label class="search-label">특허 검색</label>
                            <input type="text" class="search-input" id="searchInput" placeholder="특허명 또는 출원번호로 검색하세요" onkeypress="handleSearchKeypress(event)">
                        </div>
                        <button class="search-btn" onclick="performSearch()">검색</button>
                        <button class="reset-btn" onclick="resetSearch()">초기화</button>
                    </div>

                    <div class="filter-group">
                        <div class="filter-item">
                            <label class="search-label">법적 상태</label>
                            <select class="filter-select" id="legalStatus">
                                <option value="">전체</option>
                                <option value="examining">심사중</option>
                                <option value="registered">등록</option>
                                <option value="rejected">거절</option>
                                <option value="abandoned">포기</option>
                                <option value="expiring">만료 예정</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <label class="search-label">사업부</label>
                            <select class="filter-select" id="department">
                                <option value="">전체</option>
                                <option value="display">디스플레이사업부</option>
                                <option value="semiconductor">반도체사업부</option>
                                <option value="chemistry">화학사업부</option>
                                <option value="electric">전기사업부</option>
                                <option value="energy">에너지사업부</option>
                                <option value="material">소재사업부</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <label class="search-label">국가</label>
                            <select class="filter-select" id="country">
                                <option value="">전체</option>
                                <option value="KR">한국</option>
                                <option value="US">미국</option>
                                <option value="JP">일본</option>
                                <option value="EP">유럽</option>
                                <option value="CN">중국</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 검색 결과 -->
                <div class="search-result-msg">
                    검색 결과: <span class="search-result-count" id="resultCount">0</span>개
                </div>

                <!-- 테이블 -->
                <div class="table-container">
                    <table id="searchTable">
                        <thead>
                            <tr>
                                <th>특허명</th>
                                <th style="width: 110px;">출원번호</th>
                                <th style="width: 85px;">법적 상태</th>
                                <th style="width: 100px;">사업부</th>
                                <th style="width: 80px;">국가</th>
                                <th style="width: 90px;">출원일</th>
                                <th style="width: 90px;">재평가 대상</th>
                                <th style="width: 80px;">액션</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- 동적으로 생성됨 -->
                        </tbody>
                    </table>
                    <div class="pagination-info">결과 페이지네이션</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 특허 데이터
        const patentData = [
            { name: '고분자 합성 및 가공 기술', appNum: '10-2023-0045821', status: 'registered', dept: 'display', country: 'KR', date: '2021.03.15', isReview: true },
            { name: '디스플레이 발광 소자 구조', appNum: '10-2023-0038456', status: 'examining', dept: 'display', country: 'KR', date: '2022.05.20', isReview: true },
            { name: '광학 필터 제조 공정', appNum: '10-2023-0031209', status: 'registered', dept: 'display', country: 'KR', date: '2020.11.08', isReview: true },
            { name: '배터리 셀 조립 기술', appNum: '10-2023-0047123', status: 'registered', dept: 'energy', country: 'KR', date: '2021.06.10', isReview: false },
            { name: '나노 소재 합성 공정', appNum: '10-2023-0033894', status: 'abandoned', dept: 'material', country: 'KR', date: '2019.08.22', isReview: false },
            { name: '반도체 소자 패터닝 방법', appNum: '10-2023-0052134', status: 'registered', dept: 'semiconductor', country: 'US', date: '2020.04.15', isReview: true },
            { name: '화학 촉매 복합체 및 용도', appNum: '10-2023-0041876', status: 'examining', dept: 'chemistry', country: 'KR', date: '2022.02.14', isReview: false },
            { name: '감지 센서 칩 설계', appNum: '10-2023-0026789', status: 'registered', dept: 'display', country: 'JP', date: '2019.11.30', isReview: false },
            { name: '투명 도전성 산화물 필름', appNum: '10-2023-0056234', status: 'registered', dept: 'material', country: 'KR', date: '2021.08.12', isReview: false },
            { name: '고휘도 백색 LED 구조 설계', appNum: '10-2024-0012345', status: 'examining', dept: 'display', country: 'KR', date: '2023.06.30', isReview: true },
            { name: '극저온 동결 건조 공정', appNum: '10-2023-0067890', status: 'registered', dept: 'chemistry', country: 'EP', date: '2021.02.28', isReview: false },
            { name: '멀티레이어 코팅 기술', appNum: '10-2023-0039401', status: 'registered', dept: 'chemistry', country: 'KR', date: '2020.12.05', isReview: true },
            { name: '전자 기기 냉각 구조', appNum: '10-2023-0024567', status: 'registered', dept: 'electric', country: 'KR', date: '2022.09.18', isReview: true },
            { name: '초정밀 렌즈 가공 방법', appNum: '10-2024-0023456', status: 'examining', dept: 'display', country: 'US', date: '2023.09.15', isReview: false },
            { name: '그래핀 기반 방열 시트', appNum: '10-2023-0075432', status: 'registered', dept: 'material', country: 'KR', date: '2022.01.10', isReview: true },
            { name: '유연성 디스플레이 기본 구조', appNum: '10-2023-0093456', status: 'registered', dept: 'display', country: 'CN', date: '2015.07.12', isReview: false },
            { name: '터치센서 감지 회로', appNum: '10-2023-0097890', status: 'registered', dept: 'display', country: 'KR', date: '2016.05.30', isReview: false },
            { name: '폴리머 웹 코팅 장치', appNum: '10-2023-0052567', status: 'rejected', dept: 'chemistry', country: 'KR', date: '2023.03.25', isReview: false },
            { name: '실리콘 기반 접착제 조성물', appNum: '10-2023-0095678', status: 'registered', dept: 'material', country: 'KR', date: '2016.01.18', isReview: false },
            { name: 'LCD 백라이트 모듈 구조', appNum: '10-2023-0089123', status: 'expiring', dept: 'display', country: 'KR', date: '2014.11.05', isReview: false }
        ];

        const deptNames = {
            'display': '디스플레이사업부',
            'semiconductor': '반도체사업부',
            'chemistry': '화학사업부',
            'electric': '전기사업부',
            'energy': '에너지사업부',
            'material': '소재사업부'
        };

        const statusNames = {
            'examining': '심사중',
            'registered': '등록',
            'rejected': '거절',
            'abandoned': '포기',
            'expiring': '만료 예정'
        };

        const statusBadges = {
            'examining': 'badge-examining',
            'registered': 'badge-registered',
            'rejected': 'badge-rejected',
            'abandoned': 'badge-abandoned',
            'expiring': 'badge-expiring'
        };

        function performSearch() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const legalStatus = document.getElementById('legalStatus').value;
            const department = document.getElementById('department').value;
            const country = document.getElementById('country').value;

            const filteredData = patentData.filter(patent => {
                const matchesSearch = searchText === '' || 
                    patent.name.toLowerCase().includes(searchText) || 
                    patent.appNum.includes(searchText);
                const matchesStatus = legalStatus === '' || patent.status === legalStatus;
                const matchesDept = department === '' || patent.dept === department;
                const matchesCountry = country === '' || patent.country === country;
                
                return matchesSearch && matchesStatus && matchesDept && matchesCountry;
            });

            displayResults(filteredData);
        }

        function displayResults(results) {
            const tableBody = document.getElementById('tableBody');
            const resultCount = document.getElementById('resultCount');
            
            tableBody.innerHTML = '';
            resultCount.textContent = results.length;

            results.forEach(patent => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <a href="#" class="patent-link">${patent.name}</a>
                        <div class="patent-number">${patent.appNum}</div>
                    </td>
                    <td>${patent.appNum}</td>
                    <td><span class="badge ${statusBadges[patent.status]}">${statusNames[patent.status]}</span></td>
                    <td><span class="badge dept-badge">${deptNames[patent.dept]}</span></td>
                    <td>${patent.country}</td>
                    <td>${patent.date}</td>
                    <td>
                        ${patent.isReview ? '<span class="badge badge-blue">대상</span>' : '<span class="badge badge-gray">비대상</span>'}
                    </td>
                    <td>
                        <div class="action-cell">
                            <button class="action-btn" onclick="viewDetail('${patent.appNum}')">상세</button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function handleSearchKeypress(event) {
            if (event.key === 'Enter') {
                performSearch();
            }
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('legalStatus').value = '';
            document.getElementById('department').value = '';
            document.getElementById('country').value = '';
            displayResults(patentData);
        }

        function viewDetail(appNum) {
            alert(`특허 ${appNum}의 상세 페이지로 이동합니다.`);
        }

        // 초기 로드
        window.addEventListener('load', () => {
            displayResults(patentData);
        });

        // 사이드바 메뉴 활성화
        document.querySelectorAll('.sidebar-menu a').forEach(link => {
            link.addEventListener('click', (e) => {
                if (e.currentTarget.classList.contains('active')) {
                    e.preventDefault();
                } else {
                    document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
